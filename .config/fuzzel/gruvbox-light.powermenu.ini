[main]
font="Iosevka Nerd Font:size=16"
sort-result=false
cache=/dev/null
lines=4
width=10
hide-prompt=true
horizontal-pad=40
vertical-pad=20
inner-pad=20

[border]
width=3
radius=0

[colors]
background=fbf1c7ff         # gruvbox:light-mode(bg0)
text=3c3836ff               # gruvbox:light-mode(fg1)
prompt=3c3836ff             # gruvbox:light-mode(fg1)
input=3c3836ff              # gruvbox:light-mode(fg1)
selection=ebdbb2ff          # gruvbox:light-mode(bg1)
selection-text=282828ff     # gruvbox:light-mode(fg0)
border=d65d0eff             # gruvbox:light-mode(orange)
